font_family JetBrainsMono Nerd Font
bold_font JetBrainsMono Nerd Font Bold
italic_font JetBrainsMono Nerd Font Italic
font_size 11.0

background_opacity 1.0
dynamic_background_opacity yes
background_blur 0

foreground #d3c6aa
background #2d353b
selection_foreground #2d353b
selection_background #7fbbb3
cursor #d3c6aa
cursor_text_color #2d353b

color0 #475258
color1 #e67e80
color2 #a7c080
color3 #dbbc7f
color4 #7fbbb3
color5 #d699b6
color6 #83c092
color7 #d3c6aa
color8 #475258
color9 #e67e80
color10 #a7c080
color11 #dbbc7f
color12 #7fbbb3
color13 #d699b6
color14 #83c092
color15 #d3c6aa

url_color #7fbbb3
url_style curly

window_padding_width 14
hide_window_decorations yes
confirm_os_window_close 0

tab_bar_style powerline
tab_bar_edge bottom
tab_bar_margin_width 0
tab_bar_margin_height 0 8
active_tab_foreground #2d353b
active_tab_background #a7c080
inactive_tab_foreground #d3c6aa
inactive_tab_background #475258
tab_bar_min_tabs 1

map ctrl+shift+enter new_window
map ctrl+shift+t new_tab
map ctrl+shift+q close_window
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
