set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-features ",xterm-256color:clipboard"
set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g focus-events on
set -g status-interval 5
set -g status-position top

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

set -g status-left-length 60
set -g status-right-length 120

set -g status-style "bg=#2d353b,fg=#d3c6aa"

set -g window-style "bg=#2d353b,fg=#d3c6aa"
set -g window-active-style "bg=#2d353b,fg=#d3c6aa"

set -g pane-border-style "fg=#475258"
set -g pane-active-border-style "fg=#7fbbb3"

set -g message-style "bg=#475258,fg=#d3c6aa"
set -g message-command-style "bg=#475258,fg=#d3c6aa"

set -g mode-style "bg=#7fbbb3,fg=#2d353b"

set -g status-left "#[fg=#2d353b,bg=#7fbbb3] #S "
set -g status-right "#[fg=#d3c6aa,bg=#475258] %H:%M #[fg=#2d353b,bg=#7fbbb3] #W "

setw -g window-status-current-style "fg=#2d353b,bg=#a7c080"
setw -g window-status-current-format " #I:#W "
setw -g window-status-style "fg=#d3c6aa,bg=#475258"
setw -g window-status-format " #I:#W "
setw -g window-status-bell-style "fg=#2d353b,bg=#e67e80"
setw -g window-status-separator ""

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
bind C-s setw synchronize-panes

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle
