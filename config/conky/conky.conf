conky.config = {
    alignment = 'top_right',
    gap_x = 24,
    gap_y = 60,
    minimum_width = 220,
    maximum_width = 220,
    own_window = true,
    own_window_type = 'desktop',
    own_window_argb_visual = true,
    own_window_argb_value = 100,
    own_window_colour = '2d353b',
    own_window_transparent = false,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    border_inner_margin = 12,
    border_outer_margin = 0,
    border_width = 2,
    border_color = '7fbbb3',
    draw_borders = false,
    default_color = 'd3c6aa',
    color1 = '7fbbb3',
    color2 = 'a7c080',
    font = 'JetBrains Mono:size=9',
    double_buffer = true,
    update_interval = 2,
    total_run_times = 0,
    use_xft = true,
    override_utf8_locale = true,
    no_buffers = true,
    pad_percents = 2,
    top_name_width = 8,
    own_window_class = 'Conky',
};

conky.text = [[
${color1}${font JetBrains Mono:size=10:bold} SYSTEM ${font}${color}
${color2}${hr 2}${color}
${color}Kernel: ${color1}${kernel}
${color}Uptime: ${color1}${uptime}
${color}Packages: ${color1}${pacman_pkgs} / ${dpkg}
${color}Shell: ${color1}${bash}

${color1}${font JetBrains Mono:size=10:bold} CPU ${font}${color}
${color2}${hr 2}${color}
${color}Usage: ${color1}${cpu}%
${color}Temp: ${color1}${hwmon temp 1}°C
${color}${cpubar 6}

${color1}${font JetBrains Mono:size=10:bold} MEMORY ${font}${color}
${color2}${hr 2}${color}
${color}RAM: ${color1}$mem / $memmax ($memperc%)
${color}${membar 6}

${color1}${font JetBrains Mono:size=10:bold} DISK ${font}${color}
${color2}${hr 2}${color}
${color}Root: ${color1}${fs_used /} / ${fs_size /} (${fs_used_perc /}%)
${color}${fs_bar 6 /}

${color1}${font JetBrains Mono:size=10:bold} NETWORK ${font}${color}
${color2}${hr 2}${color}
${color}IP: ${color1}${addr wlan0}${addr eth0}
${color}Down: ${color1}${downspeed wlan0}${downspeed eth0}
${color}Up: ${color1}${upspeed wlan0}${upspeed eth0}
]];
